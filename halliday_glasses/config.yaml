name: "Halliday Glasses"
version: "0.1.0"
slug: "halliday_glasses"
description: "Wyoming bridge add-on for Halliday Glasses live transcription over PCM16 audio streams."
url: "https://example.com/local-only"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
homeassistant_api: false
hassio_api: false
ports:
  10310/tcp: 10310
ports_description:
  10310/tcp: "Halliday Glasses Wyoming server"
options:
  whisper_host: "homeassistant.local"
  whisper_port: 10300
  server_host: "0.0.0.0"
  server_port: 10310
  language: "en"
  partial_interval_ms: 1500
  min_partial_audio_ms: 1200
  silence_ms: 900
  min_utterance_ms: 400
  speech_threshold: 900
schema:
  whisper_host: str
  whisper_port: port
  server_host: str
  server_port: port
  language: str
  partial_interval_ms: int(250,)
  min_partial_audio_ms: int(250,)
  silence_ms: int(100,)
  min_utterance_ms: int(100,)
  speech_threshold: int(1,)
