name: "Halliday Glasses"
version: "1.0.0"
slug: "halliday_glasses"
description: "Wyoming speech-to-text add-on for Halliday Glasses with Vosk, OpenAI, WhisplayBot, and optional LibreTranslate final-text translation."
url: "https://github.com/FilipposPirpilidis/halliday-glasses-addon"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_stream: true
homeassistant_api: false
hassio_api: false
ports:
  10310/tcp: 10310
ports_description:
  10310/tcp: "Halliday internal Wyoming bridge port"
options:
  server_host: "0.0.0.0"
  server_port: 10310
  accepted_audio_codecs:
    - "pcm16"
    - "opus"
  language: "en"
  stt_backend: "vosk"
  model_variant: "0.15"
  model_path: "/models/vosk-model-small-en-us-0.15"
  openai_api_key: ""
  openai_realtime_model: "gpt-realtime-mini"
  openai_transcription_model: "gpt-4o-mini-transcribe"
  openai_prompt: ""
  whisplaybot_recognize_url: "http://192.168.2.29:8801/recognize"
  whisplaybot_timeout_seconds: 60
  whisplaybot_partial_window_seconds: 1
  whisplaybot_partial_inference_seconds: 2
  whisplaybot_auto_final_silence_ms: 1100
  whisplaybot_auto_final_min_seconds: 2
  whisplaybot_auto_final_silence_level: 900
  whisplaybot_cleanup_enabled: false
  whisplaybot_cleanup_url: "http://192.168.2.29:8090/llm/qwen"
  whisplaybot_cleanup_model: "qwen3.5"
  whisplaybot_cleanup_prompt: ""
  whisplaybot_cleanup_timeout_seconds: 12
  translate_enabled: false
  translate_url: "http://127.0.0.1:5000/translate"
  translate_pairs:
    - "en-el"
    - "el-en"
    - "en-de"
    - "de-en"
    - "en-fr"
    - "fr-en"
  translate_source: "en"
  translate_target: "el"
  translate_timeout_seconds: 30
schema:
  server_host: str
  server_port: port
  accepted_audio_codecs:
    - str
  language: str
  stt_backend: str
  model_variant: str
  model_path: str
  openai_api_key: str
  openai_realtime_model: str
  openai_transcription_model: str
  openai_prompt: str
  whisplaybot_recognize_url: str
  whisplaybot_timeout_seconds: int
  whisplaybot_partial_window_seconds: int
  whisplaybot_partial_inference_seconds: int
  whisplaybot_auto_final_silence_ms: int
  whisplaybot_auto_final_min_seconds: int
  whisplaybot_auto_final_silence_level: int
  whisplaybot_cleanup_enabled: bool
  whisplaybot_cleanup_url: str
  whisplaybot_cleanup_model: str
  whisplaybot_cleanup_prompt: str
  whisplaybot_cleanup_timeout_seconds: int
  translate_enabled: bool
  translate_url: str
  translate_pairs:
    - str
  translate_source: str
  translate_target: str
  translate_timeout_seconds: int
