name: "Halliday Glasses"
version: "0.2.0"
slug: "halliday_glasses"
description: "Local Vosk-powered Wyoming add-on for Halliday Glasses live transcription over PCM16 mono audio streams."
url: "https://example.com/local-only"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
homeassistant_api: false
hassio_api: false
ports:
  10310/tcp: 10310
ports_description:
  10310/tcp: "Halliday Glasses Wyoming server"
options:
